# ==========================================================
# Datasource - PostgreSQL
# ==========================================================
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/cep_service_db}
spring.datasource.username=${DATABASE_USER:admin}
spring.datasource.password=${DATABASE_PASSWORD:admin}

# ==========================================================
# Spring Data JPA - PostgreSQL
# ==========================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo

# =====================================
# HikariCP - Gerenciador de conexoes DB
# =====================================
spring.datasource.hikari.pool-name=cep-search-api
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

# 10 minutos de conexoes ociosas serem removidas
spring.datasource.hikari.idle-timeout=600000

# tempo de conexoes ate 30 segundos
spring.datasource.hikari.connection-timeout=30000

# tempo maximo de vida de conexoes em 30 minutos
spring.datasource.hikari.max-lifetime=1800000

# =====================================
# RestClient Configuration
# =====================================
viacep.base-url=${VIACEP_BASE_URL:http://localhost:8081}
viacep.connect-timeout-ms=${VIACEP_CONNECT_TIMEOUT_MS:5000}
viacep.read-timeout-ms=${VIACEP_READ_TIMEOUT_MS:30000}