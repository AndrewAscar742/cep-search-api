services:
  postgres-16:
    image: postgres:16
    container_name: postgres-16
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: cep_service_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cep-service-network

  wiremock:
    image: wiremock/wiremock:latest
    container_name: cep-service-wiremock
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings
      - ./wiremock/__files:/home/wiremock/__files
    command:
      - --verbose
    networks:
      - cep-service-network

  cep-search-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: cep-search-api:latest
    container_name: cep-search-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dsv
      DATABASE_URL: jdbc:postgresql://postgres-16:5432/cep_service_db
      DATABASE_USER: admin
      DATABASE_PASSWORD: admin
      VIACEP_BASE_URL: http://wiremock:8080
      VIACEP_CONNECT_TIMEOUT_MS: 5000
      VIACEP_READ_TIMEOUT_MS: 30000
    depends_on:
      - postgres-16
      - wiremock
    networks:
      - cep-service-network

volumes:
  postgres_data:
    name: postgres_data

networks:
  cep-service-network:
    driver: bridge