services:
  postgres-16:
    image: postgres:16
    container_name: postgres-16
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: cep_service_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cep-service-network

  cep-search-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: cep-search-api:latest
    container_name: cep-search-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prd
      DATABASE_URL: jdbc:postgresql://postgres-16:5432/cep_service_db
      DATABASE_USER: admin
      DATABASE_PASSWORD: admin
      VIACEP_BASE_URL: https://viacep.com.br
      VIACEP_CONNECT_TIMEOUT_MS: 5000
      VIACEP_READ_TIMEOUT_MS: 30000
    networks:
      - cep-service-network

volumes:
  postgres_data:
    name: postgres_data

networks:
  cep-service-network:
    driver: bridge